whitelist_kernel_modules:
  - name: vfio_iommu_type1
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: absent
  - name: vfio
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: absent
  - name: vfio_pci
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: absent
  - name: vfio_iommu_type1
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: absent

blacklist_kernel_modules:
  - name: nouveau
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: present
  - name: vfio_iommu_type1
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: present
  - name: vfio
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: present
  - name: vfio_pci
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: present
  - name: vfio_iommu_type1
    blacklist_file: /etc/modprobe.d/blacklist.conf
    state: present

